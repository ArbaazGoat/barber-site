<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Street Barber Shop</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#1a1410;
    color:#f5f5f5;
}

header {
    background:#120e0c;
    padding:15px;
    border-bottom:1px solid #3a2a22;

}

    padding:120px 20px;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,0.6), rgba(26,20,16,0.95)),

    font-size:42px;
}

.hero span {
    color:#c89b5a;
}

.btn {

    margin-top:20px;
    padding:12px 25px;
    background:#c89b5a;
    color:#000;
    text-decoration:none;
    font-weight:bold;

section {

    margin:auto;
    padding:60px 20px;
